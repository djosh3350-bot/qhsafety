<!DOCTYPE html>
<html>
<head>
    <title>QHSafety Control Panel</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px; }
        .btn { padding: 20px 40px; font-size: 20px; cursor: pointer; border: none; border-radius: 8px; color: white; }
        #pause { background: #ff4d4d; }
        #resume { background: #2ecc71; }
    </style>
</head>
<body>
    <h1>QHSafety Killswitch</h1>
    <button id="pause" class="btn">PAUSE APP (Killswitch)</button>
    <button id="resume" class="btn">RESUME APP (Online)</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            // Paste your QHSafety Firebase Config here
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('pause').onclick = () => {
            set(ref(db, 'systemStatus'), 'paused');
            alert("QHSafety is now PAUSED");
        };

        document.getElementById('resume').onclick = () => {
            set(ref(db, 'systemStatus'), 'online');
            alert("QHSafety is now ONLINE");
        };
    </script>
</body>
</html>
